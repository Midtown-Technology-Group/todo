name: Build MSI Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version to package
        required: true
        default: 0.1.0

jobs:
  build-msi:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set package version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "release") {
            $version = "${{ github.event.release.tag_name }}".TrimStart("v")
          } else {
            $version = "${{ inputs.version }}"
          }
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install WiX
        shell: pwsh
        run: dotnet tool install --global wix --version 4.*

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pyinstaller

      - name: Build MSI
        shell: pwsh
        run: ./packaging/windows/build-msi.ps1 -Version "${{ steps.version.outputs.value }}"

      - name: Get MSI metadata
        id: msi
        shell: pwsh
        run: |
          $sha = (Get-FileHash dist/todo.msi -Algorithm SHA256).Hash.ToLower()
          $productCode = ./scripts/get_msi_product_code.ps1 -Path dist/todo.msi
          "sha256=$sha" >> $env:GITHUB_OUTPUT
          "product_code=$productCode" >> $env:GITHUB_OUTPUT

      - name: Upload MSI to release
        if: github.event_name == 'release'
        shell: pwsh
        run: gh release upload "${{ github.event.release.tag_name }}" dist/todo.msi --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload workflow artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: todo-msi
          path: dist/todo.msi

      - name: Notify mtg-winget
        if: github.event_name == 'release'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.MTG_WINGET_DISPATCH_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.value }}"
          $body = @{
            event_type = "update-package"
            client_payload = @{
              package_key = "todo"
              version = $version
              installer_url = "https://github.com/Midtown-Technology-Group/todo/releases/download/v$version/todo.msi"
              sha256 = "${{ steps.msi.outputs.sha256 }}"
              product_code = "${{ steps.msi.outputs.product_code }}"
            }
          } | ConvertTo-Json -Depth 5
          $body | Set-Content dispatch.json
          gh api repos/Midtown-Technology-Group/mtg-winget/dispatches --method POST --input dispatch.json
